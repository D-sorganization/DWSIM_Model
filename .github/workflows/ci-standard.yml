name: CI Standard
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install ruff==0.14.10 black==25.12.0 mypy==1.13.0 pydocstyle==6.3.0

      - name: Lint
        run: ruff check .

      - name: Check Formatting
        run: black --check .

      - run: pip install mypy types-PyYAML types-requests
      - run: pip install pytest pytest-cov
      - run: if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash
      - run: pip install -e ".[dev]" || true
        shell: bash
      - run: mypy . --ignore-missing-imports || echo "::warning::Type checking has issues"
        shell: bash

  tests:
    needs: quality-gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - run: pip install pytest pytest-cov
      - run: if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash
      - run: pip install -e ".[dev]" || true
        shell: bash

      - name: Unit and Contract Tests
        run: pytest tests/ -m "unit or contract" --cov=src

      - name: Acceptance Tests
        run: pytest tests/ -m "acceptance"

      - name: DWSIM Integration Tests
        continue-on-error: true
        shell: bash
        run: |
          echo "Running DWSIM-marked tests separately. They will skip or soft-fail until DWSIM is provisioned in CI."
          pytest tests/ -m "dwsim" || echo "::warning::DWSIM-backed tests skipped/failed due to missing runtime in Windows CI"
