# ============================================================
#  gasifier_feeds.yaml — Gasifier Feed Stream Conditions
# ============================================================
#
# The biomass feed is represented as an equivalent gas mixture
# derived from the ultimate analysis.  Real woody biomass is
# approximately 50% C, 6% H, 43% O on a dry-ash-free basis.
#
# Because DWSIM does not natively model solid biomass, we
# decompose it here into an equivalent component mix.  The
# BiomassDecomposer class in chemistry/biomass_decomposer.py
# performs this conversion automatically when run in headless
# mode.  In GUI mode, set the components block directly.

# ────────────────────────────────────────────────────────────
# Biomass Feed
# ────────────────────────────────────────────────────────────
Gasifier_Biomass_Feed:
  temperature_C: 25.0
  pressure_Pa: 101325.0
  mass_flow_kg_s: 10.0

  # Component mix approximating woody biomass on a molar basis.
  # This is a simplified surrogate — use BiomassDecomposer for
  # a more accurate representation based on ultimate analysis.
  #
  # Rule of thumb for dry woody biomass (CH1.44O0.66 formula):
  #   CO  ~0.35, H2  ~0.25, CO2 ~0.15, H2O ~0.15, CH4 ~0.10
  components:
    Carbon monoxide: 0.35
    Hydrogen:        0.25
    Carbon dioxide:  0.15
    Water:           0.15
    Methane:         0.10

  # Ultimate analysis (dry, ash-free, mass fractions) — used by
  # BiomassDecomposer if available; otherwise components above are used.
  ultimate_analysis:
    C:  0.501
    H:  0.062
    O:  0.421
    N:  0.008
    S:  0.005
    Cl: 0.003

  # Proximate analysis (as-received, mass fractions)
  proximate_analysis:
    moisture:       0.15
    volatile_matter: 0.72
    fixed_carbon:   0.03
    ash:            0.10   # NOTE: ash + others must sum to 1.0

  # Higher heating value (for energy balance validation, MJ/kg)
  hhv_mj_kg: 18.5

# ────────────────────────────────────────────────────────────
# Gasifier Solids Feed (char recycle / supplemental carbon)
# ────────────────────────────────────────────────────────────
Gasifier_Solids_Feed:
  temperature_C: 25.0
  pressure_Pa: 101325.0
  mass_flow_kg_s: 0.5    # Small recycle stream
  components:
    Helium: 1.0    # Helium is the char/ash proxy in DWSIM

# ────────────────────────────────────────────────────────────
# Gasifier Oxygen Feed
# ────────────────────────────────────────────────────────────
Gasifier_Oxygen_Feed:
  temperature_C: 25.0
  pressure_Pa: 101325.0
  # Equivalence ratio (ER) 0.25–0.35 is typical for downdraft gasification.
  # At ER=0.30 with 10 kg/s biomass, O2 demand ≈ 2.5–3.5 kg/s.
  mass_flow_kg_s: 3.0
  components:
    Oxygen:   0.95   # Industrial-grade oxygen supply
    Nitrogen: 0.05

# ────────────────────────────────────────────────────────────
# Gasifier Steam Feed  (steam-to-carbon ratio ~0.5 typical)
# ────────────────────────────────────────────────────────────
Gasifier_Steam_Feed:
  temperature_C: 200.0    # Superheated steam
  pressure_Pa: 500000.0   # 5 bar
  mass_flow_kg_s: 2.0
  components:
    Water: 1.0

# ────────────────────────────────────────────────────────────
# Gasifier Cooling Water (jacket cooling circuit)
# ────────────────────────────────────────────────────────────
Gasifier_Cooling_Water_In:
  temperature_C: 20.0
  pressure_Pa: 300000.0   # 3 bar supply
  mass_flow_kg_s: 5.0
  components:
    Water: 1.0
