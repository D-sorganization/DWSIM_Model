# ============================================================
#  energy_inputs.yaml — Energy Stream Values
# ============================================================
#
# All values are in Watts (W).
# Positive = heat/power INTO the stream (heating).
# Negative = heat/power OUT of the stream (cooling/loss).
#
# These are applied to the EnergyStream objects in the flowsheet
# BEFORE the reactors — the sequential thermal blocks establish
# the inlet conditions to each reactor vessel.

energy_streams:

  # ── Gasifier ──────────────────────────────────────────────
  # Heat lost to environment through gasifier walls
  # (~1–3% of thermal input is a reasonable assumption)
  E_Gasifier_HeatLoss: -50000.0      # -50 kW (negative = heat loss)

  # Heat flux from gasifier to the cooling jacket water
  # This is the amount extracted by the jacket circuit
  E_Gasifier_Flux_to_CW: -200000.0  # -200 kW to jacket coolant

  # ── PEM ───────────────────────────────────────────────────
  # AC arc power delivered to the gas stream
  # Typical: 2–6 MW for 10 kg/s feed
  E_PEM_AC_Power: 5000000.0         # 5 MW AC arc

  # DC plasma torch power
  # Typical: 1–4 MW
  E_PEM_DC_Power: 3000000.0         # 3 MW DC torch

  # PEM heat losses (radiation + convection from reactor body)
  # Plasma reactors have good insulation; ~2–5% of input
  E_PEM_HeatLoss: -160000.0         # -160 kW loss

  # ── TRC ───────────────────────────────────────────────────
  # TRC is adiabatic (refractory-lined); small wall losses only
  E_TRC_HeatLoss: -30000.0          # -30 kW loss

  # ── Blower ────────────────────────────────────────────────
  # Blower/compressor shaft power
  # Sized for ~1–5 kPa pressure rise; exact value from compressor curve
  E_Blower: 150000.0                 # 150 kW shaft input
